<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CampusTap Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-green-700 flex items-center justify-center min-h-screen">
  <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
    <h1 class="text-2xl font-bold text-green-700 mb-4">CampusTap Login</h1>
    <input type="email" id="email" placeholder="Email" class="w-full mb-3 p-2 border rounded">
    <input type="password" id="password" placeholder="Password" class="w-full mb-3 p-2 border rounded">
    <select id="role" class="w-full mb-3 p-2 border rounded">
      <option value="student">Student</option>
      <option value="admin">Admin</option>
    </select>
    <button onclick="register()" class="bg-green-600 text-white w-full py-2 rounded mb-2">Register</button>
    <button onclick="login()" class="bg-blue-600 text-white w-full py-2 rounded">Login</button>
  </div>

  <!-- Firebase Script -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAoaK1A4yexEH4Ncqyr5QZLtaarOD332W8",
      authDomain: "campustapv2.firebaseapp.com",
      projectId: "campustapv2",
      storageBucket: "campustapv2.firebasestorage.app",
      messagingSenderId: "790657179226",
      appId: "1:790657179226:web:8102138e596418a3f84263",
      measurementId: "G-Q8TVX5FEJP"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    async function register() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const role = document.getElementById('role').value;
      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        await setDoc(doc(db, "users", userCredential.user.uid), { email, role });
        alert("Registered successfully!");
      } catch (error) { alert(error.message); }
    }

    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const snap = await getDoc(doc(db, "users", userCredential.user.uid));
        if (snap.exists()) {
          const role = snap.data().role;
          if (role === "admin") window.location.href = "admin.html";
          else window.location.href = "campustap.html";
        } else { alert("No role assigned. Contact admin."); }
      } catch (error) { alert(error.message); }
    }

    window.register = register;
    window.login = login;
  </script>
</body>
</html>
