<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>CampusTap — Admin (Mock Rides)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-green-700 min-h-screen text-gray-900">
  <nav class="bg-white p-4 flex justify-between items-center">
    <div class="font-bold text-green-700">Admin Dashboard</div>
    <div class="flex gap-4 items-center">
      <a href="campustap.html" class="text-green-700">Student</a>
      <a href="account.html" class="text-green-700">Account</a>
      <button id="logout" class="bg-red-600 text-white px-3 py-1 rounded">Logout</button>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
    <div class="bg-white p-4 rounded shadow"><h3 class="font-semibold text-green-700">Total Rides</h3><canvas id="ridesChart"></canvas></div>
    <div class="bg-white p-4 rounded shadow"><h3 class="font-semibold text-green-700">Total Revenue</h3><canvas id="revenueChart"></canvas></div>
    <div class="bg-white p-4 rounded shadow"><h3 class="font-semibold text-green-700">Active Shuttles</h3><canvas id="shuttleChart"></canvas></div>
  </main>

  <script>
    const FARE = 10;
    // Aggregate rides from all users' localStorage (mock only)
    function getAllRides(){
      const keys = Object.keys(localStorage).filter(k=>k.startsWith("rides:"));
      const all = [];
      keys.forEach(k=>{
        try {
          const arr = JSON.parse(localStorage.getItem(k)||"[]");
          all.push(...arr);
        } catch {}
      });
      return all;
    }
    const rides = getAllRides();
    const total = rides.length;
    const revenue = total * FARE;

    // group by date (using the formatted time string's date part)
    const byDate = {};
    rides.forEach(r=>{
      const d = (r.time || "").split(",")[0]; // date part only (depends on locale)
      byDate[d] = (byDate[d]||0)+1;
    });
    const labels = Object.keys(byDate);
    const counts = labels.map(l=>byDate[l]);

    const rctx = document.getElementById('ridesChart').getContext('2d');
    const revctx = document.getElementById('revenueChart').getContext('2d');
    const sctx = document.getElementById('shuttleChart').getContext('2d');

    new Chart(rctx, { type:'bar', data:{ labels, datasets:[{ label:'Rides per day', data:counts }] } });
    new Chart(revctx, { type:'doughnut', data:{ labels:['Revenue'], datasets:[{ data:[revenue] }] } });
    const activeShuttles = Math.min(3, (total % 5) + 1);
    new Chart(sctx, { type:'pie', data:{ labels:['Active','Inactive'], datasets:[{ data:[activeShuttles, 3-activeShuttles] }] } });

    document.getElementById("logout").onclick = ()=>{ location.href="index.html"; };
  </script>
</body>
</html>
